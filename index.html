<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #fff; }
        button { width: 80%; padding: 20px; margin: 10px; border-radius: 15px; border: none; color: white; font-weight: bold; }
        .blue { background: #0088cc; }
        .red { background: #ff3b30; }
    </style>
</head>
<body>

    <h2 id="user">Загрузка...</h2>

    <!-- КНОПКА 1: Простая отправка ключа -->
    <button class="blue" onclick="sendKey()">1. ОТПРАВИТЬ КЛЮЧ</button>

    <!-- КНОПКА 2: Тест связи (максимально простой) -->
    <button class="red" onclick="testData()">🔴 ТЕСТ СВЯЗИ</button>

<script>
    const tg = window.Telegram.WebApp;
    
    // Сообщаем Telegram, что приложение готово
    tg.ready();
    tg.expand();

    // Выводим имя пользователя для проверки, что API работает
    const user = tg.initDataUnsafe?.user?.first_name || "Пользователь";
    document.getElementById('user').innerText = "Привет, " + user;

    function sendKey() {
        // Пробуем отправить фиксированную строку
        tg.sendData("KEY_TEST_123");
    }

    function testData() {
        // Самый примитивный метод
        window.Telegram.WebApp.sendData("HELLO_TG");
    }
</script>
</body>
</html>
