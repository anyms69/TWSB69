<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #fff; color: #000; text-align: center; }
        .card { background: #f4f4f4; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; }
        button { width: 100%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        #status { color: red; font-weight: bold; margin-bottom: 10px; }
        .reset { background: #ff4d4d; font-size: 10px; padding: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Ключи не созданы</div>
    <button onclick="sendMyKey()">🔑 1. МОЙ КЛЮЧ ДЛЯ ДРУГА</button>
</div>

<div class="card">
    <input type="text" id="pKey" placeholder="Сюда вставь ключ друга...">
    <button style="background: #28a745;" onclick="acceptPartnerKey()">✔ 2. ПОДКЛЮЧИТЬ ДРУГА</button>
</div>

<div class="card">
    <button style="background: #6f42c1;" onclick="sendSecret()">🚀 3. ОТПРАВИТЬ СЕКРЕТ</button>
</div>

<button class="reset" onclick="hardReset()">СБРОСИТЬ ВСЕ НАСТРОЙКИ (ОЧИСТКА)</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let myKeys = null;
    let sharedKey = null;

    async function init() {
        try {
            const stored = localStorage.getItem('chat_v3');
            if (stored) {
                const raw = JSON.parse(stored);
                myKeys = {
                    publicKey: await crypto.subtle.importKey("jwk", raw.pub, {name: "ECDH", namedCurve: "P-256"}, true, []),
                    privateKey: await crypto.subtle.importKey("jwk", raw.priv, {name: "ECDH", namedCurve: "P-256"}, true, ["deriveKey"])
                };
            } else {
                myKeys = await crypto.subtle.generateKey({name: "ECDH", namedCurve: "P-256"}, true, ["deriveKey"]);
                const pub = await crypto.subtle.exportKey("jwk", myKeys.publicKey);
                const priv = await crypto.subtle.exportKey("jwk", myKeys.privateKey);
                localStorage.setItem('chat_v3', JSON.stringify({pub, priv}));
            }
            document.getElementById('status').innerText = "Ключи созданы и готовы";
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerText = "ОШИБКА: " + e.message;
        }
    }

    async function sendMyKey() {
        try {
            const pubRaw = await crypto.subtle.exportKey("raw", myKeys.publicKey);
            const b64 = btoa(String.fromCharCode(...new Uint8Array(pubRaw)));
            tg.sendData("PUB_KEY:" + b64);
        } catch (e) { alert("Ошибка отправки: " + e.message); }
    }

    async function acceptPartnerKey() {
        try {
            let val = document.getElementById('pKey').value.trim();
            if (val.startsWith("PUB_KEY:")) val = val.split(":")[1];
            
            const bytes = new Uint8Array(atob(val).split("").map(c => c.charCodeAt(0)));
            const partnerPub = await crypto.subtle.importKey("raw", bytes, {name: "ECDH", namedCurve: "P-256"}, true, []);
            
            sharedKey = await crypto.subtle.deriveKey(
                {name: "ECDH", public: partnerPub},
                myKeys.privateKey,
                {name: "AES-GCM", length: 256},
                true, ["encrypt", "decrypt"]
            );
            alert("ГОТОВО! Теперь можно слать секреты.");
            document.getElementById('status').innerText = "СВЯЗЬ ЗАЩИЩЕНА ✅";
        } catch (e) { alert("Ошибка ключа партнера: " + e.message); }
    }

    async function sendSecret() {
        if (!sharedKey) return alert("Сначала нажми кнопку 2!");
        try {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = await crypto.subtle.encrypt({name: "AES-GCM", iv}, sharedKey, new TextEncoder().encode("СЕКРЕТНОЕ СООБЩЕНИЕ"));
            const res = { iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(enc))) };
            tg.sendData("MSG:" + JSON.stringify(res));
        } catch (e) { alert(e.message); }
    }

    function hardReset() {
        localStorage.clear();
        location.reload();
    }

    init();
</script>
</body>
</html>
