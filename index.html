<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Chat V4</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; color: #000; text-align: center; }
        .card { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        button { width: 100%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        #status { font-weight: bold; margin-bottom: 15px; font-size: 14px; color: orange; }
        .reset-btn { background: none; color: #ff4d4d; border: 1px solid #ff4d4d; font-size: 12px; padding: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="status">⏳ Инициализация защиты...</div>

    <div class="card">
        <h3>Шаг 1</h3>
        <button id="keyBtn" onclick="sendMyKey()" disabled>🔑 ОТПРАВИТЬ МОЙ КЛЮЧ</button>
        <p style="font-size: 11px; color: #666;">Нажми, чтобы бот переслал твой ключ другу</p>
    </div>

    <div class="card">
        <h3>Шаг 2</h3>
        <input type="text" id="partnerInput" placeholder="Вставь ключ друга сюда...">
        <button id="connBtn" style="background: #28a745;" onclick="acceptPartnerKey()" disabled>✔ ПОДКЛЮЧИТЬ ДРУГА</button>
    </div>

    <div class="card" id="chatSection" style="display:none;">
        <h3>Шаг 3</h3>
        <button style="background: #6f42c1;" onclick="sendSecret()">🚀 ОТПРАВИТЬ СЕКРЕТ</button>
    </div>

    <button class="reset-btn" onclick="hardReset()">СБРОСИТЬ ВСЕ КЛЮЧИ</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let myKeys = null;
    let sharedKey = null;

    // ГЕНЕРАЦИЯ КЛЮЧЕЙ ПРИ ЗАПУСКЕ
    async function initCrypto() {
        try {
            const storageKey = 'secure_v4_store';
            const stored = localStorage.getItem(storageKey);
            
            if (stored) {
                const raw = JSON.parse(stored);
                myKeys = {
                    publicKey: await crypto.subtle.importKey("jwk", raw.pub, {name: "ECDH", namedCurve: "P-256"}, true, []),
                    privateKey: await crypto.subtle.importKey("jwk", raw.priv, {name: "ECDH", namedCurve: "P-256"}, true, ["deriveKey"])
                };
            } else {
                myKeys = await crypto.subtle.generateKey({name: "ECDH", namedCurve: "P-256"}, true, ["deriveKey"]);
                const pub = await crypto.subtle.exportKey("jwk", myKeys.publicKey);
                const priv = await crypto.subtle.exportKey("jwk", myKeys.privateKey);
                localStorage.setItem(storageKey, JSON.stringify({pub, priv}));
            }

            // Активируем кнопки
            document.getElementById('keyBtn').disabled = false;
            document.getElementById('connBtn').disabled = false;
            document.getElementById('status').innerText = "✅ ЗАЩИТА ГОТОВА";
            document.getElementById('status').style.color = "green";
            
        } catch (e) {
            document.getElementById('status').innerText = "❌ КРИТИЧЕСКАЯ ОШИБКА: " + e.message;
            document.getElementById('status').style.color = "red";
        }
    }

    // ОТПРАВКА СВОЕГО ПУБЛИЧНОГО КЛЮЧА
    async function sendMyKey() {
        if (!myKeys) return;
        try {
            const pubRaw = await crypto.subtle.exportKey("raw", myKeys.publicKey);
            const b64 = btoa(String.fromCharCode(...new Uint8Array(pubRaw)));
            tg.sendData("PUB_KEY:" + b64);
        } catch (e) { alert("Ошибка: " + e.message); }
    }

    // ПРИНЯТИЕ КЛЮЧА ОТ ПАРТНЕРА
    async function acceptPartnerKey() {
        try {
            let val = document.getElementById('partnerInput').value.trim();
            if (val.includes(":")) val = val.split(":")[1]; // Убираем PUB_KEY: если есть
            
            const binary = atob(val);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

            const partnerPub = await crypto.subtle.importKey("raw", bytes, {name: "ECDH", namedCurve: "P-256"}, true, []);
            
            sharedKey = await crypto.subtle.deriveKey(
                {name: "ECDH", public: partnerPub},
                myKeys.privateKey,
                {name: "AES-GCM", length: 256},
                true, ["encrypt", "decrypt"]
            );

            document.getElementById('chatSection').style.display = "block";
            document.getElementById('status').innerText = "🔒 СОЕДИНЕНИЕ ЗАШИФРОВАНО";
            alert("Успех! Теперь Шаг 3 разблокирован.");
        } catch (e) { alert("Неверный формат ключа: " + e.message); }
    }

    // ТЕСТОВАЯ ОТПРАВКА ШИФРОВАННОГО СООБЩЕНИЯ
    async function sendSecret() {
        if (!sharedKey) return;
        try {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const msg = "СЕКРЕТНОЕ ПОСЛАНИЕ ОТ ПАРТНЕРА";
            const enc = await crypto.subtle.encrypt({name: "AES-GCM", iv}, sharedKey, new TextEncoder().encode(msg));
            
            const result = {
                iv: btoa(String.fromCharCode(...iv)),
                data: btoa(String.fromCharCode(...new Uint8Array(enc)))
            };
            tg.sendData("MSG:" + JSON.stringify(result));
        } catch (e) { alert("Ошибка шифрования: " + e.message); }
    }

    function hardReset() {
        if(confirm("Это удалит ключи и связь. Продолжить?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Запуск процесса при загрузке страницы
    window.onload = initCrypto;
</script>
</body>
</html>
