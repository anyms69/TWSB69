<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футболист набивает мяч</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b3a2e 0%, #1a5a40 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }

        /* Главный контейнер — поле */
        .pitch {
            background: #1e7b4b;
            background-image: 
                repeating-linear-gradient(transparent, transparent 49px, rgba(255,255,240,0.15) 49px, rgba(255,255,240,0.15) 50px),
                linear-gradient(90deg, #2c8c5c, #1a5a40);
            border-radius: 48px 48px 24px 24px;
            box-shadow: 0 30px 30px -10px rgba(0,0,0,0.6), inset 0 0 0 4px #daa520, inset 0 0 0 8px #8b5a2b;
            width: min(100%, 800px);
            aspect-ratio: 16 / 10;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
        }

        /* Разметка поля (центр) */
        .center-circle {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            border: 4px solid rgba(255,255,240,0.25);
            border-radius: 50%;
        }

        .center-spot {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #f5f5dc;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.3);
            z-index: 2;
        }

        /* Футболист и мяч — анимация */
        .player-area {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 10px;
            z-index: 10;
            filter: drop-shadow(0 15px 5px rgba(0,0,0,0.3));
        }

        .player {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 140px;
            background: #1e3a5f; /* Синяя форма */
            border-radius: 60% 60% 30% 30% / 80% 80% 20% 20%;
            box-shadow: inset 0 -10px 0 #0f2b44, 0 8px 0 #0d1f30;
            z-index: 2;
        }

        /* Голова */
        .player::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 45px;
            background: #f7d9aa;
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 6px 0 #b48b5a;
        }

        /* Ноги (двигаются) */
        .leg-left, .leg-right {
            position: absolute;
            bottom: -5px;
            width: 35px;
            height: 50px;
            background: #1e3a5f;
            border-radius: 30% 30% 20% 20%;
            box-shadow: inset 0 -10px 0 #0f2b44, 0 8px 0 #0d1f30;
            animation: kick 0.9s infinite alternate ease-in-out;
            transform-origin: top center;
        }

        .leg-left {
            left: 10px;
            transform: rotate(-10deg);
        }

        .leg-right {
            right: 10px;
            transform: rotate(10deg);
            animation-delay: -0.3s;
        }

        @keyframes kick {
            0% { transform: rotate(-10deg) translateY(0); }
            100% { transform: rotate(20deg) translateY(-10px); }
        }

        /* Мяч */
        .ball {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #b0b0b0);
            border-radius: 50%;
            box-shadow: 0 8px 0 #5a5a5a, 0 10px 10px rgba(0,0,0,0.4);
            z-index: 3;
            animation: juggle 0.5s infinite alternate ease-out;
        }

        /* Классический футбольный мяч (пятиугольники) */
        .ball::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 12px;
            height: 12px;
            background: #222;
            border-radius: 50%;
            opacity: 0.7;
            box-shadow: 12px 12px 0 #222, 5px 20px 0 #222;
        }

        @keyframes juggle {
            0% { bottom: 70px; transform: translateX(-50%) scale(1); }
            100% { bottom: 140px; transform: translateX(-50%) scale(1.1); }
        }

        /* Слова (подписи) парят вокруг */
        .floating-words {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .word {
            position: absolute;
            color: #f5f5dc;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 #2a4d2e, 5px 5px 0 #00000055;
            letter-spacing: 2px;
            font-size: 1.6rem;
            opacity: 0.9;
            animation: float 6s infinite alternate ease-in-out;
        }

        .word-1 { top: 15%; left: 10%; animation-duration: 8s; }
        .word-2 { top: 25%; right: 12%; animation-duration: 7s; animation-delay: -2s; }
        .word-3 { bottom: 35%; left: 18%; animation-duration: 9s; animation-delay: -1s; }
        .word-4 { bottom: 40%; right: 20%; animation-duration: 8.5s; animation-delay: -3s; }
        .word-5 { top: 50%; left: 30%; animation-duration: 7.5s; animation-delay: -2.5s; }
        .word-6 { top: 60%; right: 25%; animation-duration: 8.2s; animation-delay: -1.2s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(15px, -15px) rotate(3deg); }
        }

        /* Дополнительные мелкие детали поля (бутсы/ворот) */
        .goal {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 60px;
            border: 5px solid #daa520;
            border-top: none;
            border-radius: 0 0 20px 20px;
            opacity: 0.4;
        }

        /* Фраза в духе Like & Follow */
        .callout {
            font-size: 1.2rem;
            background: #f5f5dcee;
            padding: 10px 28px;
            border-radius: 40px;
            color: #1e4d2e;
            font-weight: bold;
            letter-spacing: 1px;
            border: 3px solid #daa520;
            box-shadow: 0 8px 0 #6b4b1b;
            margin-top: 10px;
            z-index: 20;
            text-align: center;
        }

        .callout span {
            color: #c44;
            font-size: 1.4rem;
            margin: 0 5px;
        }

        /* адаптив */
        @media (max-width: 550px) {
            .word { font-size: 1.2rem; }
            .callout { font-size: 1rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>

<div class="pitch">
    <!-- Разметка поля -->
    <div class="center-circle"></div>
    <div class="center-spot"></div>
    <div class="goal"></div>

    <!-- Футболист с мячом -->
    <div class="player-area">
        <div class="player"></div>
        <div class="leg-left"></div>
        <div class="leg-right"></div>
        <div class="ball"></div>
    </div>

    <!-- Парящие слова (футбольная тематика) -->
    <div class="floating-words">
        <div class="word word-1">⚽ JUGGLE</div>
        <div class="word word-2">LIKE</div>
        <div class="word word-3">PRO</div>
        <div class="word word-4">SKILL</div>
        <div class="word word-5">FOLLOW</div>
        <div class="word word-6">GOAL</div>
    </div>

    <!-- Нижний блок с Like & Follow (как в оригинале) -->
    <div class="callout">
        ⚡ JUGGLE LIKE <span>❤️</span> & <span>🔔</span> FOLLOW FOR MORE ⚡
    </div>
</div>

</html>
